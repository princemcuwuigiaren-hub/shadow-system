name: Fetch Fixtures

on:
  schedule:
    - cron: '0 5,13,21 * * *'  # runs 3x daily: 6AM, 2PM, 10PM WAT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch fixtures (yesterday through 3 days ahead)
        run: |
          YESTERDAY=$(date -u -d '-1 day' +%Y-%m-%d)
          AHEAD=$(date -u -d '+3 days' +%Y-%m-%d)
          echo "Fetching fixtures from $YESTERDAY to $AHEAD"
          curl -s \
            -H "X-Auth-Token: aaaf3943f83f469a85a50abee5eacde6" \
            "https://api.football-data.org/v4/matches?dateFrom=$YESTERDAY&dateTo=$AHEAD" \
            -o data/fixtures.json
          echo "Match count: $(python3 -c "import json; d=json.load(open('data/fixtures.json')); print(len(d.get('matches',[])))")"

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/fixtures.json
          git diff --staged --quiet || git commit -m "Fixtures $(date -u +%Y-%m-%d-%H%M)"
          git push
          
